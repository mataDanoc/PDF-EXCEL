<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF → Excel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d2e;
      --card:    #20243a;
      --border:  #2e3250;
      --accent:  #4f7fff;
      --accent2: #7c3aed;
      --success: #22c55e;
      --error:   #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  14px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 28px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      background: var(--card);
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(79,127,255,.08);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .drop-icon { font-size: 3rem; margin-bottom: 14px; }
    .drop-zone h2 { font-size: 1rem; margin-bottom: 6px; font-weight: 600; }
    .drop-zone p  { color: var(--muted); font-size: 0.85rem; }

    /* Selected file */
    .selected {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .selected .fname {
      flex: 1;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .selected .fsize { color: var(--muted); font-size: 0.82rem; }
    .remove-btn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1.2rem; padding: 0 4px;
    }
    .remove-btn:hover { color: var(--error); }

    /* Action button */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all .2s;
      margin-top: 20px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      opacity: .9;
      transform: translateY(-1px);
    }
    .btn-success {
      background: var(--success);
      color: #0a1f0e;
    }
    .btn-success:hover:not(:disabled) { opacity: .9; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* Progress */
    .progress-wrap {
      margin-top: 20px;
    }
    .progress-label {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-align: center;
    }
    .progress-bar {
      height: 6px;
      border-radius: 99px;
      background: var(--border);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .4s ease;
      width: 0%;
    }

    /* Error */
    .error-box {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="card">
  <h1>PDF → Excel</h1>

  <!-- Step 1: Drop zone (shown when no file selected) -->
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".pdf"/>
    <div class="drop-icon">📄</div>
    <h2>Tërhiq PDF-në këtu ose kliko</h2>
    <p>Konverto në Excel</p>
  </div>

  <!-- Step 2: Selected file (shown after selection) -->
  <div class="selected hidden" id="selected">
    <span style="font-size:1.4rem">📄</span>
    <div style="flex:1; overflow:hidden">
      <div class="fname" id="fname"></div>
      <div class="fsize" id="fsize"></div>
    </div>
    <button class="remove-btn" id="remove-btn" title="Hiq">✕</button>
  </div>

  <!-- Convert button -->
  <button class="btn btn-primary hidden" id="btn-convert">
    <span>⚡</span> Konverto në Excel
  </button>

  <!-- Progress -->
  <div class="progress-wrap hidden" id="progress-wrap">
    <div class="progress-label" id="progress-label">Duke konvertuar...</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <!-- Download button -->
  <button class="btn btn-success hidden" id="btn-download">
    <span>⬇</span> Shkarko Excel
  </button>

  <!-- Error box -->
  <div class="error-box hidden" id="error-box"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────
let selectedFile = null;
let currentJobId = null;
let currentOutput = null;
let pollInterval = null;

// ── Elements ─────────────────────────────────────────────
const dropZone     = document.getElementById('drop-zone');
const fileInput    = document.getElementById('file-input');
const selectedBox  = document.getElementById('selected');
const fnameEl      = document.getElementById('fname');
const fsizeEl      = document.getElementById('fsize');
const removeBtn    = document.getElementById('remove-btn');
const btnConvert   = document.getElementById('btn-convert');
const progressWrap = document.getElementById('progress-wrap');
const progressLabel= document.getElementById('progress-label');
const progressFill = document.getElementById('progress-fill');
const btnDownload  = document.getElementById('btn-download');
const errorBox     = document.getElementById('error-box');

// ── Drag & Drop ──────────────────────────────────────────
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const files = [...e.dataTransfer.files];
  if (files.length) handleFile(files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
  fileInput.value = '';
});

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showError('Vetëm skedarë PDF lejohen');
    return;
  }
  selectedFile = file;
  fnameEl.textContent = file.name;
  fsizeEl.textContent = (file.size / 1024).toFixed(1) + ' KB';
  dropZone.classList.add('hidden');
  selectedBox.classList.remove('hidden');
  btnConvert.classList.remove('hidden');
  hideError();
  btnDownload.classList.add('hidden');
  progressWrap.classList.add('hidden');
}

removeBtn.addEventListener('click', resetUI);

function resetUI() {
  selectedFile = null;
  currentJobId = null;
  currentOutput = null;
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  dropZone.classList.remove('hidden');
  selectedBox.classList.add('hidden');
  btnConvert.classList.add('hidden');
  progressWrap.classList.add('hidden');
  btnDownload.classList.add('hidden');
  hideError();
  progressFill.style.width = '0%';
}

// ── Convert ──────────────────────────────────────────────
btnConvert.addEventListener('click', startConvert);

async function startConvert() {
  if (!selectedFile) return;

  btnConvert.disabled = true;
  btnConvert.innerHTML = '<span class="spinner"></span> Duke ngarkuar...';
  hideError();

  const form = new FormData();
  form.append('files', selectedFile);

  try {
    const res = await fetch('/api/convert', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Gabim gjatë ngarkimit');

    currentJobId = data.job_ids[0];
    progressWrap.classList.remove('hidden');
    progressLabel.textContent = 'Duke konvertuar...';
    progressFill.style.width = '10%';
    btnConvert.classList.add('hidden');

    // Start polling
    pollInterval = setInterval(pollJob, 1500);
  } catch (err) {
    showError(err.message);
    btnConvert.disabled = false;
    btnConvert.innerHTML = '<span>⚡</span> Konverto në Excel';
  }
}

async function pollJob() {
  if (!currentJobId) return;
  try {
    const res = await fetch(`/api/status/${currentJobId}`);
    const job = await res.json();

    progressFill.style.width = (job.progress || 0) + '%';

    if (job.status === 'done') {
      clearInterval(pollInterval);
      pollInterval = null;
      progressFill.style.width = '100%';
      progressLabel.textContent = '✓ Gati!';
      currentOutput = job.output;
      setTimeout(() => {
        progressWrap.classList.add('hidden');
        btnDownload.classList.remove('hidden');
      }, 500);
    } else if (job.status === 'error') {
      clearInterval(pollInterval);
      pollInterval = null;
      progressWrap.classList.add('hidden');
      showError(job.error || 'Gabim gjatë konvertimit');
      btnConvert.classList.remove('hidden');
      btnConvert.disabled = false;
      btnConvert.innerHTML = '<span>⚡</span> Konverto përsëri';
    }
  } catch (err) {
    // Network blip — keep trying
  }
}

// ── Download ─────────────────────────────────────────────
btnDownload.addEventListener('click', () => {
  if (!currentOutput) return;
  const a = document.createElement('a');
  a.href = `/api/download/${encodeURIComponent(currentOutput)}`;
  a.download = currentOutput;
  document.body.appendChild(a);
  a.click();
  a.remove();
  // After download, reset to allow converting another file
  setTimeout(resetUI, 800);
});

// ── Error helpers ────────────────────────────────────────
function showError(msg) {
  errorBox.textContent = '⚠ ' + msg;
  errorBox.classList.remove('hidden');
}
function hideError() {
  errorBox.classList.add('hidden');
}
</script>
</body>
</html>
